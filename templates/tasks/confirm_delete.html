{% extends 'base.html' %}
{% block title %}Delete Task — TaskFlow{% endblock %}
{% block page_title %}Delete Task{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card" style="border-color:var(--accent2)">
      <div class="card-header" style="color:var(--accent2)"><i class="bi bi-exclamation-triangle-fill me-2"></i>Confirm Delete</div>
      <div class="card-body text-center py-4">
        <p>Are you sure you want to delete the task:</p>
        <p><strong>{{ task.title }}</strong></p>
        <div class="d-flex gap-3 justify-content-center mt-4">
          <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
          </form>
          <a href="{% url 'task_detail' task.pk %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
